        GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
      name: Build akhaten
      run: nix-build -A checks.machines.akhaten --out-link result-akhaten
    - env:
        NIKS3_AUTH_TOKEN: ${{ secrets.NIKS3_API_TOKEN }}
        NIKS3_SERVER_URL: https://cache.luj.fr
      name: Push to cache
      run: nix-shell -I 
        nixpkgs=/nix/store/ds2x1l37fidk2b65c4cwg77vp976fbd4-source -p 
        'callPackage 
        /nix/store/m9qfxk88xxcmqqzyr108v0mkhl277c4m-source/nix/packages/niks3.nix
        {}' -p util-linux --run 'bash scripts/push-to-cache.sh ./result-akhaten'
    - env:
        COMMIT_SHA: ${{ github.sha }}
        GH_TOKEN: ${{ secrets.GH_STATUS_TOKEN }}
        JOB_STATUS: ${{ job.status }}
        RUN_NUMBER: ${{ github.run_number }}
